services:
  unified-frontend:
    build:
      context: /home/minijoe/dev/unified-frontend/app
      dockerfile: Dockerfile
    container_name: unified-frontend
    restart: unless-stopped
    env_file:
      - /home/minijoe/dev/unified-frontend/app/.env.local
    environment:
      - NODE_ENV=production
      - DB_PATH=/data/unified.db
    volumes:
      - unified-db:/data
    mem_limit: 512m
    healthcheck:
      # F3: node:24-slim has no curl. Use the Node runtime (always present) to hit the
      # health endpoint; exit 1 on any non-2xx/3xx or connection error so the container
      # is correctly marked unhealthy.
      test:
        - 'CMD'
        - 'node'
        - '-e'
        - "require('http').get('http://localhost:3001/api/health',r=>process.exit(r.statusCode<400?0:1)).on('error',()=>process.exit(1))"
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    labels:
      - 'com.centurylinklabs.watchtower.enable=false'

volumes:
  unified-db:
